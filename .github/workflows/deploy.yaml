name: Deploy to Inleed

on:
    push:
          branches:
                - main
    
    workflow_dispatch:

permissions:
    contents: read

concurrency:
    group: deploy
    cancel-in-progress: true

jobs:
    deploy:
        name: Deploy website
        runs-on: ubuntu-latest

        environment: production

        steps:
            - name: Check out repository
              uses: actions/checkout@v4

            - name: Configure SSH
              env:
                SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
                SSH_KNOWN_HOSTS: ${{ secrets.SSH_KNOWN_HOSTS }}
              run: |
                set -euo pipefail

                install -m 700 -d ~/.ssh

                printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
                chmod 600 ~/.ssh/deploy_key

                printf '%s\n' "$SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts
                chmod 600 ~/.ssh/known_hosts

            - name: Test SSH-connection
              env:
                SSH_HOST: ${{ secrets.SSH_HOST }}
                SSH_PORT: ${{ secrets.SSH_PORT }}
                SSH_USER: ${{ secrets.SSH_USER }}
              run: |
                set -euo pipefail

                ssh \
                    -i ~/.ssh/deploy_key \
                    -p "$SSH_PORT" \
                    -o BatchMode=yes \
                    -o StrictHostKeyChecking=yes \
                    "$SSH_USER@$SSH_HOST" \
                    "echo 'SSH connection successful'"

            - name: Check deployment directory
              env:
                SSH_HOST: ${{ secrets.SSH_HOST }}
                SSH_PORT: ${{ secrets.SSH_PORT }}
                SSH_USER: ${{ secrets.SSH_USER }}
              run: |
                set -euo pipefail

                ssh \
                  -i ~/.ssh/deploy_key \
                  -p "$SSH_PORT" \
                  -o BatchMode=yes \
                  -o StrictHostKeyChecking=yes \
                  "$SSH_USER@$SSH_HOST" \
                  '
                    set -eu

                    TARGET="$HOME/domains/johnsilvell.com/public_html"

                    test -d "$TARGET"
                    test -w "$TARGET"

                    echo "Deployment directory:"
                    printf "%s\n" "$TARGET"
                  '

            - name: Deploy website over SSH
              env:
                SSH_HOST: ${{ secrets.SSH_HOST }}
                SSH_PORT: ${{ secrets.SSH_PORT }}
                SSH_USER: ${{ secrets.SSH_USER }}
              run: |
                set -euo pipefail

                tar \
                  --exclude='.git' \
                  --exclude='.github' \
                  --exclude='.gitignore' \
                  --exclude='README.md' \
                  --exclude='.DS_Store' \
                  -czf - . |
                ssh \
                  -i ~/.ssh/deploy_key \
                  -p "$SSH_PORT" \
                  -o BatchMode=yes \
                  -o StrictHostKeyChecking=yes \
                  "$SSH_USER@$SSH_HOST" \
                  '
                    set -eu
                    cd "$HOME/domains/johnsilvell.com/public_html"
                    tar -xzf -
                  '